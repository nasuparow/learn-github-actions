name: Node.js CI

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test Application
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-versin: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
      
      - name: sample sh
        run: ./test/abc.sh